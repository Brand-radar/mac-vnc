name: mac-vnc
on:
  workflow_dispatch: {}
permissions:
  contents: write            # built-in GITHUB_TOKEN pushes the phone-home file (conn.txt)
jobs:
  vnc:
    runs-on: macos-15         # Sequoia arm64. NEVER macos-26/macos-latest (Tahoe AVF = invisible app windows). Fallback: macos-15-intel.
    timeout-minutes: 350      # < 6h hard cap
    env:
      VNC_PW: ${{ secrets.VNC_PW }}
      NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
      SSH_PUBKEY: ${{ secrets.SSH_PUBKEY }}
      DATA_FILE: ${{ secrets.DATA_FILE }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      # ---- 1) build the REAL encrypted .app from the private source, then scrub it ----
      - name: Checkout private app source
        uses: actions/checkout@v4
        with:
          repository: Brand-radar/brandradar-build
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          persist-credentials: false
          path: app-src
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build the ENCRYPTED .app (Cython -> .so, then PyInstaller)
        continue-on-error: true     # even if the build breaks, still bring up the desktop
        run: |
          set -e
          cd app-src
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt
          pip3 install "pyinstaller>=6.10" "cython>=3.0"
          python3 -m playwright install chromium || true
          python3 build/build_cython.py
          echo "compiled .so: $(find app -name '*.so' | wc -l | tr -d ' ')"
          python3 -m PyInstaller build/BrandRadar.spec --noconfirm --clean --distpath dist --workpath build/work
          APP=$(find dist -maxdepth 1 -name "*.app" | head -1)
          test -n "$APP" || { echo "BUILD FAILED"; exit 1; }
          codesign --force --deep --sign - "$APP" || true
          mkdir -p "$HOME/AppUnderTest"
          cp -R "$APP" "$HOME/AppUnderTest/"
          # customer-style: the installable zip in ~/Downloads (NOT on the Desktop, per request)
          mkdir -p "$HOME/Downloads"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$HOME/Downloads/BrandRadar-macOS.zip"
          echo "BUILT $APP"
      - name: Scrub private source + PAT
        if: always()
        run: rm -rf app-src

      # ---- 2) install Chrome + stage the Desktop (Chrome + data file ONLY, no app) ----
      - name: Chrome + Desktop staging
        continue-on-error: true
        run: |
          brew install --cask google-chrome || echo "WARN: Chrome install failed"
          ln -sf "/Applications/Google Chrome.app" "$HOME/Desktop/Google Chrome.app" || true
          printf '%s' "$DATA_FILE" > "$HOME/Desktop/بيانات-رصيد-للصق.txt"
          open "$HOME/Desktop" || true
          echo "staged Chrome + data file (no app on Desktop; installer zip in ~/Downloads)"

      # ---- 3) keep the console session awake + unlocked ----
      - name: Keep awake
        run: |
          caffeinate -disu &
          sudo pmset -a displaysleep 0 sleep 0 disksleep 0 || true

      # ---- 4) enable SSH (Remote Login) + install my key (for the residential-IP tunnel) ----
      - name: Enable SSH + authorized key
        run: |
          sudo systemsetup -setremotelogin on || true
          mkdir -p "$HOME/.ssh"; chmod 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PUBKEY" >> "$HOME/.ssh/authorized_keys"
          chmod 600 "$HOME/.ssh/authorized_keys"
          echo "ssh ready for user runner"

      # ---- 5) enable Apple's BUILT-IN Remote Management (attaches to the real Aqua desktop) ----
      - name: Enable built-in VNC (legacy 8-char password)
        run: |
          KS=/System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart
          sudo "$KS" -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "$VNC_PW" \
            -restart -agent -privs -all || true
          sudo "$KS" -activate -configure -access -on -users runner -privs -all -restart -agent || true
          echo "VNC enabled"

      # ---- 6) bigger resolution (best effort) ----
      - name: Resolution
        continue-on-error: true
        run: |
          brew install displayplacer || true
          ID=$(displayplacer list | awk '/Persistent screen id/{print $NF; exit}')
          [ -n "$ID" ] && displayplacer "id:$ID res:1680x1050 scaling:on" || true

      # ---- 7) ngrok raw-TCP tunnels (5900 VNC + 22 SSH) + phone the endpoints home ----
      - name: Tunnel + phone home
        run: |
          brew install ngrok jq || true
          cat > /tmp/ngrok.yml <<EOF
          version: "2"
          authtoken: ${NGROK_AUTHTOKEN}
          tunnels:
            vnc: { proto: tcp, addr: 5900 }
            ssh: { proto: tcp, addr: 22 }
          EOF
          ngrok start --all --config /tmp/ngrok.yml --log=stdout > /tmp/ngrok.log 2>&1 &
          VNCU=""; SSHU=""
          for i in $(seq 1 40); do
            J=$(curl -s http://127.0.0.1:4040/api/tunnels || true)
            VNCU=$(echo "$J" | jq -r '.tunnels[]|select(.name=="vnc").public_url' 2>/dev/null)
            SSHU=$(echo "$J" | jq -r '.tunnels[]|select(.name=="ssh").public_url' 2>/dev/null)
            [ -n "$VNCU" ] && [ "$VNCU" != "null" ] && [ -n "$SSHU" ] && [ "$SSHU" != "null" ] && break
            sleep 3
          done
          BODY="VNC=$VNCU
          SSH=$SSHU
          VNC_PW=$VNC_PW"
          echo "$BODY"; echo "--- ngrok.log ---"; tail -5 /tmp/ngrok.log || true
          SHA=$(gh api repos/$REPO/contents/conn.txt --jq .sha 2>/dev/null || true)
          gh api --method PUT repos/$REPO/contents/conn.txt \
            -f message="conn" \
            -f content="$(printf '%s' "$BODY" | base64)" \
            ${SHA:+-f sha=$SHA} || echo "phone-home PUT failed"

      # ---- 8) keep alive until I push a STOP file (remote kill-switch via gh) ----
      - name: Keep alive
        run: |
          for i in $(seq 1 340); do
            gh api repos/$REPO/contents/STOP >/dev/null 2>&1 && { echo "STOP seen"; break; }
            sleep 60
          done
